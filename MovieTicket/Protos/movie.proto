syntax = "proto3";

option csharp_namespace = "MovieService";

package movie;

service MovieGrpc {

  // Unary RPC
  rpc GetMovieById (MovieRequest)
  returns (MovieReply);

  // Streaming RPC
  rpc GetAllMovies (Empty)
  returns (stream MovieReply);
}

message Empty {}

message MovieRequest {
  int32 id = 1;
}

message MovieReply {

  int32 id = 1;

  string title = 2;

  string image = 3;

  double rating = 4;

  int32 duration = 5;

  string description = 6;
}